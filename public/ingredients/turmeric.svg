<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <radialGradient id="tBg" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rhiz1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="rhiz2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="rhiz3" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <radialGradient id="cut" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="150" cy="165" rx="120" ry="100" fill="url(#tBg)"/>

  <!-- Back rhizomes (deeper) -->
  <ellipse cx="192" cy="110" rx="19" ry="40" fill="url(#rhiz3)" transform="rotate(-18 192 110)" opacity="0.75"/>
  <ellipse cx="72" cy="115" rx="17" ry="38" fill="url(#rhiz2)" transform="rotate(22 72 115)" opacity="0.75"/>

  <!-- Main horizontal rhizome body -->
  <ellipse cx="150" cy="165" rx="80" ry="34" fill="url(#rhiz1)" transform="rotate(-5 150 165)"/>

  <!-- Ring texture lines on main rhizome -->
  <ellipse cx="118" cy="162" rx="10" ry="32" fill="none" stroke="#92400e" stroke-width="1.5" opacity="0.35" transform="rotate(-5 118 162)"/>
  <ellipse cx="150" cy="163" rx="10" ry="32" fill="none" stroke="#92400e" stroke-width="1.5" opacity="0.35" transform="rotate(-5 150 163)"/>
  <ellipse cx="182" cy="162" rx="10" ry="32" fill="none" stroke="#92400e" stroke-width="1.5" opacity="0.35" transform="rotate(-5 182 162)"/>

  <!-- Top finger (growing up) -->
  <ellipse cx="150" cy="98" rx="20" ry="46" fill="url(#rhiz2)" transform="rotate(5 150 98)"/>
  <!-- Ring on top finger -->
  <ellipse cx="150" cy="85" rx="19" ry="8" fill="none" stroke="#92400e" stroke-width="1.2" opacity="0.35" transform="rotate(5 150 85)"/>
  <ellipse cx="150" cy="100" rx="19" ry="8" fill="none" stroke="#92400e" stroke-width="1.2" opacity="0.35" transform="rotate(5 150 100)"/>

  <!-- Left finger -->
  <ellipse cx="68" cy="163" rx="18" ry="40" fill="url(#rhiz3)" transform="rotate(15 68 163)"/>

  <!-- Right finger -->
  <ellipse cx="232" cy="158" rx="16" ry="35" fill="url(#rhiz1)" transform="rotate(-12 232 158)"/>

  <!-- Cut cross-section showing bright orange interior -->
  <ellipse cx="110" cy="200" rx="28" ry="28" fill="url(#rhiz1)"/>
  <ellipse cx="110" cy="200" rx="22" ry="22" fill="url(#cut)"/>
  <ellipse cx="110" cy="200" rx="10" ry="10" fill="#fef9c3"/>
  <!-- Radial lines in cross section -->
  <line x1="110" y1="178" x2="110" y2="222" stroke="#d97706" stroke-width="1" opacity="0.4"/>
  <line x1="88" y1="200" x2="132" y2="200" stroke="#d97706" stroke-width="1" opacity="0.4"/>
  <line x1="94" y1="184" x2="126" y2="216" stroke="#d97706" stroke-width="0.8" opacity="0.3"/>
  <line x1="126" y1="184" x2="94" y2="216" stroke="#d97706" stroke-width="0.8" opacity="0.3"/>

  <!-- Small yellow-green leaf sprouts -->
  <path d="M150 55 C138 42 125 40 120 50" fill="none" stroke="#65a30d" stroke-width="3" stroke-linecap="round"/>
  <path d="M150 55 C162 42 175 40 180 50" fill="none" stroke="#4d7c0f" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="125" cy="48" rx="11" ry="4" fill="#84cc16" transform="rotate(-40 125 48)"/>
  <ellipse cx="175" cy="48" rx="11" ry="4" fill="#65a30d" transform="rotate(40 175 48)"/>
</svg>
